<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div id="register" class="card p-4 shadow" style="width: 400px;">
        <h3 class="text-center">Create Account</h3>

        <form @submit.prevent="registerUser">
            <input type="text" class="form-control mb-2" placeholder="Full Name" v-model="full_name">
            <input type="email" class="form-control mb-2" placeholder="Email" v-model="email">
            <input type="password" class="form-control mb-2" placeholder="Password" v-model="password">

            <button class="btn btn-success w-100">Register</button>
            <div v-if="alertErrorShow" class="alert alert-danger mt-3">
                {{ alertMessage }}
            </div>
            <div v-if="alertSuccessShow" class="alert alert-success mt-3">
                {{ alertMessage }}
            </div>
        </form>
            
        

        <p class="text-center mt-3">
            Already have an account? <a href="login.html">Login</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="scripts/auth.js"></script>
    <script src="scripts/register.js"></script>
</body>

</html>
