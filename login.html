<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <title>Login - POS</title>
</head>

<body class="bg-dark d-flex align-items-center justify-content-center vh-100">

    <div id="login" class="card p-4 shadow" style="width: 350px;">
        <h3 class="text-center">POS Login</h3>

        <form @submit.prevent="loginUser">
            <input type="email" class="form-control mb-3" placeholder="Email" v-model="email">
            <input type="password" class="form-control mb-3" placeholder="Password" v-model="password">

            <button type="submit" class="btn btn-primary w-100">Login</button>
            <div v-if="alertErrorShow" class="alert alert-danger mt-3">
                {{ alertMessage }}
            </div>
            <div v-if="alertSuccessShow" class="alert alert-success mt-3">
                {{ alertMessage }}
            </div>
        </form>

        <p class="text-center mt-3">
            No account? <a href="register.html">Register</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="scripts/auth.js"></script>
    <script src="scripts/login.js"></script>
</body>

</html>
